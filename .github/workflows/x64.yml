name: Windows-x64-Portable-Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows-x64:
    name: Build Windows x64 Portable
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        shell: pwsh

      - name: Full compile
        run: npm run compile
        shell: pwsh

      - name: Build vscode-win32-x64
        run: npm run gulp vscode-win32-x64
        shell: pwsh

      - name: Move build to workspace
        run: |
          move ..\vscode-win32-x64 .\vscode-win32-x64
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSCode-Win32-x64
          path: vscode-win32-x64/
          retention-days: 7
