name: VS Code Windows x64 Portable Build
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VSCODE_QUALITY: oss
  VSCODE_ARCH: x64
  ELECTRON_SKIP_BINARY_DOWNLOAD: 0
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  build-windows-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Global tools install
        run: |
          npm install -g gulp typescript
        shell: pwsh

      - name: Install all dependencies
        run: npm ci
        shell: pwsh

      - name: Full TypeScript compile
        run: npm run compile
        shell: pwsh

      - name: Build full portable win32-x64 folder
        run: npm run gulp vscode-win32-x64
        shell: pwsh

      - name: Upload full portable code folder
        uses: actions/upload-artifact@v4
        with:
          name: VSCode-win32-x64
          path: ../vscode-win32-x64/
          retention-days: 7
          if-no-files-found: error
