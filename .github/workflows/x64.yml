name: VS Code Windows x64 Build (Portable Folder Only)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node20 警告
  VSCODE_QUALITY: 'oss'
  VSCODE_ARCH: 'x64'

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: |
          npm install -g gulp typescript
        shell: pwsh

      - name: Install project dependencies
        run: |
          npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        shell: pwsh

      - name: Compile project
        run: npm run compile
        shell: pwsh

      # 只编译：绿色版、带所有依赖、可直接运行的文件夹
      - name: Build VS Code Win32 x64
        run: npm run gulp vscode-win32-x64-min-ci
        shell: pwsh

      # 打包成 zip 方便下载
      - name: Create portable archive
        run: |
          Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath ..\VSCode-win32-x64.zip
        shell: pwsh

      # 上传产物：只有绿色版文件夹 + zip
      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: VSCode-Win32-x64-Portable
          path: |
            ../VSCode-win32-x64/
            ../VSCode-win32-x64.zip
          retention-days: 7
