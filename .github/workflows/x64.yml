name: VS Code Windows x64 Portable Build
on:
  workflow_dispatch:

env:
  # 强制Node24，彻底消除GitHub Node20弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VSCODE_QUALITY: oss
  VSCODE_ARCH: x64
  # 必须下载Electron，之前SKIP导致文件缺失根源
  ELECTRON_SKIP_BINARY_DOWNLOAD: 0
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  build-windows-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Global tools install
        run: |
          npm install -g gulp typescript
        shell: pwsh

      - name: Install all dependencies
        run: npm ci
        shell: pwsh

      - name: Full TypeScript compile
        run: npm run compile
        shell: pwsh

      # 官方完整构建指令，不是min-ci精简版！彻底解决preload.js缺失报错
      - name: Build full portable win32-x64 folder
        run: npm run gulp vscode-win32-x64
        shell: pwsh

      # 仅上传完整绿色文件夹，无任何安装包、无setup、无打包程序
      - name: Upload full portable code folder
        uses: actions/upload-artifact@v4
        with:
          name: VSCode-win32-x64
          path: ../vscode-win32-x64/
          retention-days: 7
          if-no-files-found: error
